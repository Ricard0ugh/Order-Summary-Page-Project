<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    
    <title>Frontend Mentor | Order summary card</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
    <!-- CSS file -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section id="order-card">
        <img
          src="images/illustration-hero.svg"
          alt="Picture of a guy wearing headphones"
        >
        <div class="order-info">
          
          <h2>Order Summary</h2>
          <p id="order-message">You can now listen to millions of songs, audiobooks, and podcasts on any 
          device anywhere you like!</p>

          <div class="plan">
            <img
              src="images/icon-music.svg"
              alt="Image of a music logo"
            >
            <div class="plan-info">
            <h3>Annual Plan</h3>
            <p>$59.99/year</p>
            </div>

            <a href="#" id="change-button">Change</a>
          </div>
          <a href="#" id="payment-button">Proceed to Payment</a>
          <a href="#" id="cancel-button">Cancel Order</a>
        </div>
      </section>
    </main>
  </body>
</html>
